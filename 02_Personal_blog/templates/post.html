<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <style>
        body { font-family: 'Georgia', serif; max-width: 800px; margin: 0 auto; padding: 40px; line-height: 1.8; }
        .meta { color: #888; font-family: sans-serif; font-size: 0.8rem; }
        h1 { font-size: 3rem; margin-top: 10px; }
        .subtitle { font-style: italic; color: #555; font-size: 1.4rem; }
        .content { margin-top: 40px; font-size: 1.2rem; }
        .back { margin-top: 50px; display: block; text-decoration: none; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="meta">{{ post.date_posted.strftime('%B %d, %Y') }}</div>
    <h1>{{ post.title }}</h1>
    <div class="subtitle">{{ post.subtitle }}</div>
    <div class="content">{{ post.content | replace('\n', '<br>') | safe }}</div>
    <a href="/" class="back">&larr; Back to Home</a>
</body>
</html>
