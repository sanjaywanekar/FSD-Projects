<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <style>
        body { font-family: 'Georgia', serif; max-width: 800px; margin: 0 auto; padding: 40px; }
        header { border-bottom: 3px solid #000; margin-bottom: 30px; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; font-size: 1.1rem; }
        .btn { background: #000; color: white; padding: 12px 30px; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        nav a { text-decoration: none; color: #666; font-size: 0.8rem; margin-right: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <header>
        <nav><a href="/">HOME</a></nav>
        <h1>New Entry</h1>
    </header>
    <form method="POST">
        <input type="text" name="title" placeholder="Post Title" required>
        <input type="text" name="subtitle" placeholder="Subtitle (Optional)">
        <textarea name="content" rows="15" placeholder="Write your blog content here..." required></textarea>
        <button type="submit" class="btn">Publish to Blog</button>
    </form>
</body>
</html>
